name: Bulk Create Uni Issues
on:
  workflow_dispatch: # Manueller Start-Button unter "Actions"

jobs:
  create_issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create Issues in Weekly Batches
        run: |
          # Funktion zum Erstellen: gh issue create --title "Titel" --label "Fach"
          
          echo "Erstelle Issues für Woche 1..."
          gh issue create --title "Analysis 2: A2E-Sheet 7" --label "Analysis 2" --body "Wochenaufgabe 1"
          gh issue create --title "Operating system: OS-Sheet 8" --label "OS" --body "Wochenaufgabe 1"
          gh issue create --title "Control Eng: CS-Sheet 7" --label "Control Eng" --body "Wochenaufgabe 1"
          gh issue create --title "Physic lab: Labprotocoll-1" --label "Physic lab" --body "Wochenaufgabe 1"

          echo "Erstelle Issues für Woche 2..."
          gh issue create --title "Analysis 2: A2E-Sheet 8" --label "Analysis 2" --body "Wochenaufgabe 2"
          gh issue create --title "Operating system: OS-Sheet 9" --label "OS" --body "Wochenaufgabe 2"
          gh issue create --title "Control Eng: CS-Sheet 8" --label "Control Eng" --body "Wochenaufgabe 2"
          gh issue create --title "Physic lab: Labprotocoll-2" --label "Physic lab" --body "Wochenaufgabe 2"

          echo "Erstelle Issues für Woche 3..."
          gh issue create --title "Analysis 2: A2E-Sheet 9" --label "Analysis 2" --body "Wochenaufgabe 3"
          gh issue create --title "Operating system: OS-Sheet 10" --label "OS" --body "Wochenaufgabe 3"
          gh issue create --title "Control Eng: CS-Sheet 9" --label "Control Eng" --body "Wochenaufgabe 3"
          gh issue create --title "Physic lab: Labprotocoll-3" --label "Physic lab" --body "Wochenaufgabe 3"

          echo "Erstelle Issues für Woche 4..."
          gh issue create --title "Analysis 2: A2E-Sheet 10" --label "Analysis 2" --body "Wochenaufgabe 4"
          gh issue create --title "Operating system: OS-Sheet 11" --label "OS" --body "Wochenaufgabe 4"
          gh issue create --title "Control Eng: CS-Sheet 10" --label "Control Eng" --body "Wochenaufgabe 4"
          gh issue create --title "Physic lab: Labprotocoll-4" --label "Physic lab" --body "Wochenaufgabe 4"

          echo "Erstelle Projekte und Berichte..."
          gh issue create --title "DSP: Project" --label "DSP" --body "Semesterprojekt"
          gh issue create --title "AI-Lab: Labreport" --label "AI-Lab" --body "Abschlussbericht"
          gh issue create --title "AI-Lab: Powerpoint" --label "AI-Lab" --body "Präsentation"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
