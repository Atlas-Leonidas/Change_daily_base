name: Weekly Uni Task Injector
on:
  schedule:
    - cron: '0 8 * * 3' # Mittwochs 08:00
  workflow_dispatch:

jobs:
  update_tasks:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Sicherstellen, dass Labels existieren
          gh label create "Analysis 2" --color "1d76db" --force --repo ${{ github.repository }} || true
          gh label create "OS" --color "e99695" --force --repo ${{ github.repository }} || true
          gh label create "Physic lab" --color "fbca04" --force --repo ${{ github.repository }} || true

          # 2. Datum berechnen (KW 19 ist Start für Sheet 7/8)
          CURRENT_KW=$(date +%V)
          START_KW=19
          DIFF=$((10#$CURRENT_KW - 10#$START_KW))

          # 3. Analysis 2 (Limit 11)
          A2=$((7 + DIFF))
          if [ $A2 -le 11 ]; then
            gh issue create --title "Analysis 2: Sheet $A2" --body "Wöchentliche Aufgabe" --label "Analysis 2" --repo ${{ github.repository }}
          fi

          # 4. OS (Limit 11)
          OS=$((8 + DIFF))
          if [ $OS -le 11 ]; then
            gh issue create --title "Operating system: Sheet $OS" --body "Wöchentliche Aufgabe" --label "OS" --repo ${{ github.repository }}
          fi
          
          # 5. Physik (Alle 2 Wochen, Limit 4)
          if [ $((DIFF % 2)) -eq 0 ]; then
            PHYS=$((1 + DIFF/2))
            if [ $PHYS -le 4 ]; then
              gh issue create --title "Physic lab: Labprotocoll-$PHYS" --body "Zweiwöchentlicher Bericht" --label "Physic lab" --repo ${{ github.repository }}
            fi
          fi

